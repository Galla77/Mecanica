services:
  - type: web
    name: mecanica-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mecanica-db
          property: connectionString

databases:
  - name: mecanica-db
    databaseName: mecanica
    user: mecanica_user
